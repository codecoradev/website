name: Deploy to Cloudflare Pages + Worker Router

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Deploy landing page to CF Pages
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d ".vitepress/dist" ] || [ -z "$(ls -A .vitepress/dist)" ]; then
            echo "::error::Build output is empty or missing."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: npx wrangler pages project create codecora-dev --production-branch=main || true
          command: pages deploy .vitepress/dist/ --project-name=codecora-dev --commit-dirty=true --branch=main

  # Deploy Worker router (only after Pages projects exist)
  # NOTE: First deploy will fail if cora/trapfall Pages not yet created.
  # Merge their PRs first, then re-run this workflow.
  deploy-worker:
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: cf-worker
