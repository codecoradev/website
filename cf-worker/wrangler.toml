name = "codecora-router"
main = "router.js"
compatibility_date = "2024-01-01"

# Service bindings — CF Pages projects
# These get created automatically when CF Pages projects are deployed
[[services]]
binding = "WEBSITE"
service = "codecora-dev"
entrypoint = "./.vitepress/server.js"

[[services]]
binding = "UTEKE"
service = "uteke"
entrypoint = "./.vitepress/server.js"

# NOTE: service = "cora-cli" (NOT "cora" — that's a placeholder Pages project)
[[services]]
binding = "CORA"
service = "cora-cli"
entrypoint = "./.vitepress/server.js"

[[services]]
binding = "TRAPFALL"
service = "trapfall"
entrypoint = "./.vitepress/server.js"

[[services]]
binding = "RUNGU"
service = "rungu-docs"
entrypoint = "./.vitepress/server.js"

# Custom domain route
[[routes]]
pattern = "codecora.dev/*"
zone_name = "codecora.dev"

[[routes]]
pattern = "www.codecora.dev/*"
zone_name = "codecora.dev"
